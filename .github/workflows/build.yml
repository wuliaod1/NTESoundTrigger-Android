name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        run: |
          ANDROID_HOME=${{ runner.tool_cache }}/android-sdk
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          mkdir -p $ANDROID_HOME
          
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          
          # Accept licenses with correct SHA1 hash
          mkdir -p $ANDROID_HOME/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abe" > $ANDROID_HOME/licenses/android-sdk-preview-license
          
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            --sdk_root=$ANDROID_HOME \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Build Debug APK
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          ./gradlew assembleDebug --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NTESoundTrigger-debug
          path: app/build/outputs/apk/debug/app-debug.apk
